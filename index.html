<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iSchedule 生產排程表</title>
    <style>
        :root {
            /* Apple UI 豐富配色 */
            --ios-blue: #007AFF;
            --ios-orange: #FF9500;
            --ios-indigo: #5856D6;
            --ios-green: #34C759;
            --ios-gray: #8E8E93;
            
            /* 玻璃擬態樣式 */
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.7);
            --text-main: #1D1D1F;
            --blur: blur(25px) saturate(190%);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --glass-bg: rgba(28, 28, 30, 0.7);
                --glass-border: 1px solid rgba(255, 255, 255, 0.1);
                --text-main: #F5F5F7;
            }
        }

        body {
            font-family: -apple-system, "SF Pro", "PingFang TC", sans-serif;
            background: linear-gradient(150deg, #D2E3FC 0%, #F3E5F5 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0; padding: env(safe-area-inset-top) 16px;
        }

        /* 響應式框架：PC 橫向 / 手機縱向 */
        .app-container {
            max-width: 1300px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            padding: 20px 0;
        }

        @media (min-width: 1024px) {
            .app-container {
                grid-template-columns: 350px 1fr; /* PC 模式左欄控制、右欄看板 */
                align-items: start;
            }
            .header-section { grid-column: span 2; }
        }

        .header-section h1 { font-size: 32px; font-weight: 800; margin: 0; letter-spacing: -1.2px; }
        .header-section p { color: var(--ios-gray); margin-top: 5px; font-weight: 600; }

        /* 玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
        }

        /* 表單與輸入 */
        .form-item { margin-bottom: 18px; }
        label { font-size: 12px; font-weight: 700; color: var(--ios-gray); text-transform: uppercase; margin-bottom: 8px; display: block; }
        input, select {
            width: 100%; box-sizing: border-box; background: rgba(142, 142, 147, 0.12);
            border: none; padding: 14px; border-radius: 14px; font-size: 17px; color: var(--text-main); outline: none;
        }

        .btn-submit {
            background: var(--ios-blue); color: white; border: none; width: 100%; padding: 18px;
            border-radius: 18px; font-size: 18px; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.3);
        }
        .btn-submit:active { transform: scale(0.96); }

        /* 甘特圖可視化核心 */
        .timeline-scroll { overflow-x: auto; border-radius: 15px; }
        .timeline-canvas { min-width: 900px; position: relative; padding: 40px 0 10px; }
        
        .time-labels { display: flex; margin-left: 80px; position: absolute; top: 10px; width: calc(100% - 80px); }
        .hour-tick { flex: 1; text-align: center; font-size: 10px; color: var(--ios-gray); border-left: 1px solid rgba(0,0,0,0.05); }

        .track {
            height: 70px; margin-bottom: 15px; background: rgba(142, 142, 147, 0.05);
            border-radius: 16px; display: flex; align-items: center; position: relative;
        }
        .track-header { width: 80px; text-align: center; font-weight: 800; font-size: 14px; color: var(--ios-indigo); z-index: 5; }

        /* 任務條 */
        .task-bar {
            position: absolute; height: 50px; border-radius: 14px; color: white;
            padding: 0 12px; font-size: 13px; font-weight: 600;
            display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 6px 15px rgba(0,0,0,0.15); cursor: grab; z-index: 10;
        }
        .task-bar:active { cursor: grabbing; transform: scale(1.03); }
        .task-bar small { font-size: 10px; opacity: 0.8; margin-top: 2px; pointer-events: none; }

        /* 班別色彩 */
        .color-morning { background: linear-gradient(90deg, #FF9500, #FFCC00); }
        .color-afternoon { background: linear-gradient(90deg, #5856D6, #AF52DE); }
        .color-night { background: linear-gradient(90deg, #1C1C1E, #636366); }

    </style>
</head>
<body>

<div class="app-container">
    <div class="header-section">
        <h1>iSchedule 生產排程表</h1>
        <p id="displayDate">2026年4月2日</p>
    </div>

    <div class="glass-card">
        <div class="form-item">
            <label>產品名稱 / 機台編號</label>
            <input type="text" id="pName" placeholder="例如：A01 洩壓餐盒">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-item">
                <label>班別預設</label>
                <select id="pShift">
                    <option value="0">早班 (08:00)</option>
                    <option value="8">中班 (16:00)</option>
                    <option value="16">晚班 (00:00)</option>
                </select>
            </div>
            <div class="form-item">
                <label>計畫工時 (H)</label>
                <input type="number" id="pHours" value="4" step="0.5">
            </div>
        </div>
        <button class="btn-submit" onclick="addTask()">確認加入排程</button>
        
        <div style="margin-top: 25px; font-size: 11px; color: var(--ios-gray); line-height: 1.6;">
            <strong>操作提示：</strong><br>
            • 加入後可直接在右側看板「左右拖移」調整時段。<br>
            • 系統將自動記憶您最後輸入的產品與工時。<br>
            • 每個小格磁吸對齊單位為 30 分鐘。
        </div>
    </div>

    <div class="glass-card">
        <label>今日生產時間軸 (拖拽微調)</label>
        <div class="timeline-scroll">
            <div class="timeline-canvas" id="canvasArea">
                <div class="time-labels" id="hourMarkers"></div>
                
                <div class="track" id="tr-0" ondrop="drop(event)" ondragover="allow(event)">
                    <div class="track-header">早班</div>
                </div>
                <div class="track" id="tr-8" ondrop="drop(event)" ondragover="allow(event)">
                    <div class="track-header">中班</div>
                </div>
                <div class="track" id="tr-16" ondrop="drop(event)" ondragover="allow(event)">
                    <div class="track-header">晚班</div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 初始化刻度與記憶
    const markers = document.getElementById('hourMarkers');
    for(let i=0; i<24; i++) markers.innerHTML += `<div class="hour-tick">${i}:00</div>`;

    window.onload = () => {
        if(localStorage.getItem('lastPName')) document.getElementById('pName').value = localStorage.getItem('lastPName');
        if(localStorage.getItem('lastPHours')) document.getElementById('pHours').value = localStorage.getItem('lastPHours');
        document.getElementById('displayDate').innerText = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'long'});
    };

    // 2. 音效系統
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(f) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(f, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    // 3. 拖拽核心
    let offsetX = 0;
    let count = 0;

    function allow(e) { e.preventDefault(); }

    function addTask() {
        const name = document.getElementById('pName').value || "未命名產品";
        const hours = parseFloat(document.getElementById('pHours').value);
        const shift = document.getElementById('pShift').value;

        // 記憶輸入
        localStorage.setItem('lastPName', name);
        localStorage.setItem('lastPHours', hours);

        count++;
        const id = "tk-" + count;
        const bar = document.createElement('div');
        bar.id = id;
        bar.draggable = true;
        
        // 色彩邏輯
        let color = "color-morning";
        if(shift == "8") color = "color-afternoon";
        if(shift == "16") color = "color-night";
        bar.className = `task-bar ${color}`;
        
        const canvasW = document.getElementById('canvasArea').offsetWidth - 80;
        const hrW = canvasW / 24;
        bar.style.width = (hours * hrW) + "px";
        bar.style.left = "80px"; 

        bar.innerHTML = `<span>${name}</span><small id="${id}-txt">00:00 (${hours}H)</small>`;
        
        bar.ondragstart = (e) => {
            e.dataTransfer.setData("text", e.target.id);
            offsetX = e.clientX - e.target.getBoundingClientRect().left;
        };

        document.getElementById('tr-' + shift).appendChild(bar);
        playSound(1000);
    }

    function drop(e) {
        e.preventDefault();
        const id = e.dataTransfer.getData("text");
        const el = document.getElementById(id);
        const track = e.currentTarget;
        const rect = track.getBoundingClientRect();
        
        const hrW = (rect.width - 80) / 24;
        let x = e.clientX - rect.left - offsetX;
        
        // 30 分鐘磁吸 (Snap)
        const snapStep = hrW / 2;
        let finalX = Math.round((x - 80) / snapStep) * snapStep + 80;
        finalX = Math.max(80, Math.min(finalX, rect.width - el.offsetWidth));
        
        el.style.left = finalX + "px";
        track.appendChild(el);

        // 更新 UI 時間文字
        const startTotal = ((finalX - 80) / hrW).toFixed(1);
        const hh = Math.floor(startTotal);
        const mm = (startTotal % 1 * 60).toFixed(0).padStart(2, '0');
        const d = (el.offsetWidth / hrW).toFixed(1);
        document.getElementById(id + "-txt").innerText = `${hh}:${mm} (${d}H)`;
        
        playSound(700);
    }
</script>

</body>
</html>
