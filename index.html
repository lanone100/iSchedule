<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>iSchedule 生產排程表 - 模式切換版</title>
    <style>
        :root {
            /* 預設淺色模式變數 */
            --bg-main: linear-gradient(150deg, #D2E3FC 0%, #F3E5F5 100%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: 1px solid rgba(255, 255, 255, 0.7);
            --text-primary: #1D1D1F;
            --text-secondary: #8E8E93;
            --input-fill: rgba(0, 0, 0, 0.05);
            --blur-val: blur(30px) saturate(200%);
            --ios-blue: #007AFF;
        }

        /* 當使用者系統開啟「深色模式」時自動覆蓋 */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-main: linear-gradient(150deg, #000000 0%, #1C1C1E 100%);
                --glass-bg: rgba(28, 28, 30, 0.75);
                --glass-border: 1px solid rgba(255, 255, 255, 0.1);
                --text-primary: #F5F5F7;
                --text-secondary: #AEAEB2;
                --input-fill: rgba(255, 255, 255, 0.1);
            }
        }

        /* 基礎樣式優化 */
        body {
            font-family: -apple-system, "SF Pro", "PingFang TC", sans-serif;
            background: var(--bg-main);
            background-attachment: fixed;
            color: var(--text-primary);
            margin: 0; padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--blur-val);
            -webkit-backdrop-filter: var(--blur-val);
            border: var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        /* PC 與手機的響應式橫向佈局切換 */
        .app-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            max-width: 1400px;
            margin: auto;
        }

        @media (min-width: 1024px) {
            .app-layout {
                grid-template-columns: 350px 1fr; /* PC 橫式轉移 */
            }
        }

        /* 輸入框適配 */
        input, select {
            width: 100%; box-sizing: border-box;
            background: var(--input-fill);
            border: none; padding: 14px; border-radius: 14px;
            color: var(--text-primary); font-size: 17px;
            outline: none; margin-top: 8px;
        }

        /* 任務方塊 - 強化深色模式對比 */
        .task-bar {
            position: absolute; height: 75px; border-radius: 16px; color: white;
            padding: 12px; font-size: 12px; font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        /* 模式切換按鈕 (手動預留) */
        .mode-toggle {
            position: fixed; bottom: 30px; right: 30px;
            width: 50px; height: 50px; border-radius: 25px;
            background: var(--ios-blue); color: white;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 5px 15px rgba(0,122,255,0.4);
            cursor: pointer; z-index: 100;
        }
    </style>
</head>
<body>

<div class="app-layout">
    <div class="sidebar">
        <div class="glass-card">
            <h2 style="margin:0 0 15px;">排程控制</h2>
            <label style="color:var(--text-secondary); font-size:12px; font-weight:bold;">生產資訊</label>
            <input type="text" id="pMold" placeholder="模具號碼: M-2026-X">
            <input type="text" id="pPart" placeholder="產品料號: PET-882">
            <button onclick="alert('已發布')" style="width:100%; margin-top:20px; background:var(--ios-blue); border:none; color:white; padding:15px; border-radius:15px; font-weight:bold;">發布排程</button>
        </div>
    </div>

    <div class="main-content">
        <div class="glass-card" style="height: 400px; position: relative;">
            <p>機台看板 - 2026/04/02</p>
            <div class="task-bar" style="top:100px; left:120px; width:200px; background: linear-gradient(135deg, #5856D6, #AF52DE);">
                <b>射出機 A01</b><br>
                <span>M-2026-X / PET-882</span>
            </div>
        </div>
    </div>
</div>

<div class="mode-toggle" onclick="toggleTheme()">🌓</div>

<script>
    // 記憶功能：儲存內容至 LocalStorage
    document.querySelectorAll('input').forEach(input => {
        input.value = localStorage.getItem(input.id) || '';
        input.addEventListener('input', (e) => {
            localStorage.setItem(e.target.id, e.target.value);
        });
    });

    // 手動強制切換 (僅用於測試，預設已跟隨系統)
    function toggleTheme() {
        const currentBg = getComputedStyle(document.documentElement).getPropertyValue('--bg-main');
        if (currentBg.includes('#000000')) {
            document.documentElement.style.setProperty('--bg-main', 'linear-gradient(150deg, #D2E3FC 0%, #F3E5F5 100%)');
            document.documentElement.style.setProperty('--glass-bg', 'rgba(255, 255, 255, 0.45)');
            document.documentElement.style.setProperty('--text-primary', '#1D1D1F');
        } else {
            document.documentElement.style.setProperty('--bg-main', 'linear-gradient(150deg, #000000 0%, #1C1C1E 100%)');
            document.documentElement.style.setProperty('--glass-bg', 'rgba(28, 28, 30, 0.75)');
            document.documentElement.style.setProperty('--text-primary', '#F5F5F7');
        }
    }
</script>

</body>
</html>
