<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能生產排程系統</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-color: #1d1d1f;
            --accent-color: #0071e3;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #2c3e50 0%, #000000 100%);
            --glass-bg: rgba(0, 0, 0, 0.4);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f5f5f7;
            --accent-color: #0a84ff;
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-color);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 玻璃擬態容器 */
        .glass-container {
            width: 100%;
            max-width: 1100px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            padding: 24px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        h2 { margin: 0; font-size: 1.5rem; font-weight: 600; }

        /* 響應式佈局切換 */
        .main-content {
            display: grid;
            gap: 20px;
            grid-template-columns: 1fr; /* 手機預設：直式 */
        }

        @media (min-width: 850px) {
            .main-content {
                grid-template-columns: 1fr 1fr; /* PC：橫式雙欄 */
            }
        }

        /* 表單與表格樣式 */
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 18px;
            border: 1px solid var(--glass-border);
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.9rem; margin-bottom: 6px; opacity: 0.8; }
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            font-size: 1rem;
            outline: none;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: transform 0.1s;
            width: 100%;
            margin-top: 10px;
        }
        .btn:active { transform: scale(0.95); }

        .theme-toggle {
            background: none;
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }
        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        .result-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 8px;
            background: rgba(0, 184, 148, 0.2);
            color: #00b894;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <header>
            <h2>Production Schedule</h2>
            <button class="theme-toggle" onclick="toggleTheme()">切換模式</button>
        </header>

        <div class="main-content">
            <div class="card">
                <div class="input-group">
                    <label>生產線編號</label>
                    <input type="text" id="lineId" placeholder="例如：PET-01" class="save-data">
                </div>
                <div class="input-group">
                    <label>預計產量 (pcs)</label>
                    <input type="number" id="targetQty" placeholder="0" class="save-data">
                </div>
                <div class="input-group">
                    <label>標準週期 (sec)</label>
                    <input type="number" id="cycleTime" placeholder="0.0" step="0.1" class="save-data">
                </div>
                <button class="btn" onclick="calculateSchedule()">開始計算並儲存</button>
            </div>

            <div class="card">
                <h3 style="margin-top:0">計算結果摘要</h3>
                <table>
                    <tr>
                        <th>項目</th>
                        <th>數值</th>
                    </tr>
                    <tr>
                        <td>所需總時數</td>
                        <td><span id="totalHours">0</span> 小時</td>
                    </tr>
                    <tr>
                        <td>預計完工日</td>
                        <td><span id="finishDate" class="result-badge">--/--</span></td>
                    </tr>
                </table>
                <p style="font-size: 0.8rem; opacity: 0.6; margin-top: 15px;">
                    * 系統已自動記憶您的輸入內容。
                </p>
            </div>
        </div>
    </div>

    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        // 1. 初始化與記憶功能
        window.onload = () => {
            const inputs = document.querySelectorAll('.save-data');
            inputs.forEach(input => {
                const savedValue = localStorage.getItem(input.id);
                if (savedValue) input.value = savedValue;
            });
            
            // 檢查深色模式偏好
            if (localStorage.getItem('theme') === 'dark') {
                document.body.setAttribute('data-theme', 'dark');
            }
        };

        // 2. 計算邏輯與儲存
        function calculateSchedule() {
            playSound();
            const qty = parseFloat(document.getElementById('targetQty').value) || 0;
            const cycle = parseFloat(document.getElementById('cycleTime').value) || 0;
            
            // 公式：(產量 * 週期) / 3600秒 = 總小時
            const hours = ((qty * cycle) / 3600).toFixed(2);
            document.getElementById('totalHours').innerText = hours;

            // 簡易完工日期預估 (當前時間 + 小時)
            const finish = new Date();
            finish.setHours(finish.getHours() + parseFloat(hours));
            document.getElementById('finishDate').innerText = finish.toLocaleString('zh-TW', {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});

            // 記憶輸入內容
            const inputs = document.querySelectorAll('.save-data');
            inputs.forEach(input => {
                localStorage.setItem(input.id, input.value);
            });
        }

        // 3. 主題切換
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            playSound();
        }

        // 4. 音效回饋
        function playSound() {
            const audio = document.getElementById('clickSound');
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Audio play blocked"));
        }
    </script>
</body>
</html>
